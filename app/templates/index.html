<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>swurl — URL Shortener</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <main class="hero">
    <h1>swurl</h1>
    <p class="tagline">A tiny URL shortener.</p>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="total-links">—</span>
        <span class="stat-label">links shortened</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="total-visits">—</span>
        <span class="stat-label">redirects served</span>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
